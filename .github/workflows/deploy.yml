name: Deploy

on:
  push:
    branches: [main]

# O deploy é feito pela integração Git da Vercel automaticamente.
# Este workflow serve como gate: só consideramos "deployado" se a CI passou.
# Para deploy via CLI (alternativa à integração Git), descomente o job abaixo
# e configure os secrets VERCEL_TOKEN, VERCEL_ORG_ID e VERCEL_PROJECT_ID.

jobs:
  notify:
    name: Deploy gate
    runs-on: ubuntu-latest
    steps:
      - run: echo "Push na main detectado. Vercel fará o deploy automático após a CI verde."

